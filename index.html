<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Diagnostic Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding-top: 60px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            margin: 15px;
            padding: 15px 30px;
            background: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #005fa3;
        }

        .note {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>

<body>

    <h1>English Diagnostic Menu</h1>

    <button class="btn" onclick="goToLink1()">Link 1</button>
    <button class="btn" onclick="goToLink2()">Link 2</button>
    <button class="btn" onclick="goToTarget()">Target Setting</button>

    <p class="note">Note: Link 1 and Link 2 are identical.</p>

    <script>
        function goToLink1() {
            window.location.href = "https://exambase.github.io/english-test/";
        }

        function goToLink2() {
            window.location.href = "https://exambase.github.io/english-test-1";
        }

        function goToTarget() {
            window.location.href = "https://exambase.github.io/English-target-setting/";
        }
    </script>

</body>
</html>
